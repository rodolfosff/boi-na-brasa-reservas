<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Reservas &mdash; Boi na Brasa</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --preto:#0E0B08;
    --carvao:#1A1511;
    --fumaca:#2A231C;
    --branco:#FFF8EE;
    --cinza:#B8AC9C;
    --amarelo:#F7B32B;
    --laranja:#E8641B;
    --brasa:#C93A0F;
    --verde:#4CAF6E;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--preto);
    color:var(--branco);
    font-family:'Barlow',sans-serif;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  .container{max-width:960px;margin:0 auto;padding:0 20px}

  header{
    background:var(--carvao);
    border-bottom:1px solid rgba(247,179,43,.2);
    padding:16px 0;
  }
  header .container{display:flex;align-items:center;justify-content:space-between}
  .marca-wrap{display:flex;align-items:center;gap:12px}
  .logo-nav{height:44px;width:auto}
  .marca{
    font-family:'Alfa Slab One',serif;
    font-size:1.05rem;color:var(--amarelo);
  }
  .logo-login{
    display:block;height:112px;width:auto;
    margin:0 auto 16px;
    filter:drop-shadow(0 0 18px rgba(232,100,27,.4));
    animation:logoPulso 3.2s ease-in-out infinite;
  }
  @keyframes logoPulso{
    0%,100%{filter:drop-shadow(0 0 14px rgba(232,100,27,.3))}
    50%{filter:drop-shadow(0 0 28px rgba(247,179,43,.55))}
  }
  @keyframes entrar{
    from{opacity:0;transform:translateY(14px)}
    to{opacity:1;transform:none}
  }
  .cartao{animation:entrar .35s ease-out both}
  @media (prefers-reduced-motion: reduce){
    .logo-login{animation:none}
    .cartao{animation:none}
  }
  .marca span{color:var(--branco)}
  .marca small{
    display:block;
    font-family:'Barlow Condensed',sans-serif;
    font-size:.8rem;font-weight:600;
    letter-spacing:2.5px;text-transform:uppercase;
    color:var(--cinza);
  }
  #btn-sair{
    display:none;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:.95rem;
    text-transform:uppercase;letter-spacing:1.5px;
    background:transparent;color:var(--cinza);
    border:1px solid rgba(184,172,156,.4);
    border-radius:5px;padding:8px 16px;cursor:pointer;
  }
  #btn-sair:hover{color:var(--branco);border-color:var(--branco)}

  /* ---------- LOGIN ---------- */
  #tela-login{padding:70px 0}
  .card-login{
    max-width:400px;margin:0 auto;
    background:var(--carvao);
    border:1px solid rgba(247,179,43,.22);
    border-radius:12px;
    padding:36px 30px;
  }
  .card-login h1{
    font-family:'Alfa Slab One',serif;
    font-weight:400;font-size:1.5rem;
    text-align:center;margin-bottom:6px;
  }
  .card-login p{text-align:center;color:var(--cinza);font-size:.95rem;margin-bottom:26px}
  label{
    display:block;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:.9rem;
    text-transform:uppercase;letter-spacing:1.8px;
    color:var(--amarelo);margin-bottom:6px;
  }
  input{
    width:100%;
    background:var(--fumaca);
    border:1px solid rgba(255,248,238,.14);
    border-radius:6px;
    color:var(--branco);
    font-size:1rem;
    padding:12px 13px;
    margin-bottom:18px;
  }
  input:focus{border-color:var(--laranja);outline:none}
  .btn{
    width:100%;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:1.1rem;
    text-transform:uppercase;letter-spacing:2px;
    color:var(--preto);
    background:linear-gradient(180deg,var(--amarelo),var(--laranja));
    border:none;border-radius:6px;
    padding:13px;cursor:pointer;
  }
  .btn:disabled{opacity:.55;cursor:wait}
  .erro-login{
    display:none;
    margin-top:14px;padding:12px;
    border-radius:6px;text-align:center;font-size:.92rem;
    background:rgba(201,58,15,.14);
    border:1px solid rgba(201,58,15,.6);
    color:#FF8A5C;
  }

  /* ---------- PAINEL ---------- */
  #tela-painel{display:none;padding:34px 0 60px}
  .filtros{
    display:flex;gap:8px;flex-wrap:wrap;
    margin-bottom:22px;
  }
  .filtro{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:.95rem;
    text-transform:uppercase;letter-spacing:1.5px;
    background:var(--carvao);color:var(--cinza);
    border:1px solid rgba(184,172,156,.25);
    border-radius:100px;
    padding:8px 18px;cursor:pointer;
  }
  .filtro.ativo{
    background:var(--amarelo);color:var(--preto);
    border-color:var(--amarelo);
  }
  #contador{color:var(--cinza);font-size:.92rem;margin-bottom:16px}
  .cartao{
    background:var(--carvao);
    border:1px solid rgba(255,248,238,.1);
    border-left:4px solid var(--cinza);
    border-radius:10px;
    padding:18px 20px;
    margin-bottom:14px;
    display:flex;flex-wrap:wrap;
    justify-content:space-between;
    gap:14px;align-items:center;
  }
  .cartao.pendente{border-left-color:var(--amarelo)}
  .cartao.confirmada{border-left-color:var(--verde)}
  .cartao.cancelada{border-left-color:var(--brasa);opacity:.65}
  .info-reserva{flex:1;min-width:220px}
  .nome-cliente{font-weight:700;font-size:1.1rem}
  .detalhes{color:var(--cinza);font-size:.95rem;margin-top:2px}
  .detalhes strong{color:var(--branco);font-weight:600}
  .obs{
    margin-top:6px;font-size:.9rem;color:var(--cinza);
    font-style:italic;
  }
  .fiel{
    margin-top:5px;font-size:.85rem;font-weight:600;
    color:var(--amarelo);
  }
  .badge{
    display:inline-block;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:.8rem;
    text-transform:uppercase;letter-spacing:1.5px;
    border-radius:100px;padding:4px 12px;
    margin-bottom:6px;
  }
  .badge.pendente{background:rgba(247,179,43,.15);color:var(--amarelo)}
  .badge.confirmada{background:rgba(76,175,110,.15);color:var(--verde)}
  .badge.cancelada{background:rgba(201,58,15,.18);color:#FF8A5C}
  .acoes{display:flex;gap:8px}
  .acoes button{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:.92rem;
    text-transform:uppercase;letter-spacing:1.2px;
    border-radius:6px;padding:9px 16px;cursor:pointer;
    border:1px solid transparent;
  }
  .b-confirmar{background:var(--verde);color:var(--preto);border:none}
  .b-cancelar{background:transparent;color:#FF8A5C;border-color:rgba(201,58,15,.6)}
  .b-whats{background:transparent;color:var(--amarelo);border-color:rgba(247,179,43,.5);text-decoration:none;display:inline-block}
  .acoes button:hover,.b-whats:hover{filter:brightness(1.15)}

  /* ---------- TABELAS (PLANILHA / CLIENTES) ---------- */
  .tabela-wrap{
    overflow-x:auto;
    border:1px solid rgba(255,248,238,.1);
    border-radius:10px;
    background:var(--carvao);
  }
  table.tabela{width:100%;border-collapse:collapse;min-width:640px}
  .tabela th{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:.85rem;
    text-transform:uppercase;letter-spacing:1.5px;
    color:var(--amarelo);text-align:left;
    padding:12px 14px;
    background:var(--fumaca);
    border-bottom:1px solid rgba(247,179,43,.25);
    white-space:nowrap;
  }
  .tabela td{
    padding:11px 14px;font-size:.95rem;
    border-bottom:1px solid rgba(255,248,238,.07);
  }
  .tabela tr:last-child td{border-bottom:none}
  .btn-csv{
    margin-top:14px;
    font-family:'Barlow Condensed',sans-serif;
    font-weight:600;font-size:1rem;
    text-transform:uppercase;letter-spacing:1.5px;
    color:var(--preto);
    background:linear-gradient(180deg,var(--amarelo),var(--laranja));
    border:none;border-radius:6px;
    padding:11px 20px;cursor:pointer;
  }
  .btn-csv:hover{filter:brightness(1.1)}

  /* ---------- CALENDÁRIO ---------- */
  .cal-card{
    background:linear-gradient(180deg,var(--carvao),#15100C);
    border:1px solid rgba(247,179,43,.22);
    border-radius:16px;
    padding:20px 18px 16px;
    box-shadow:0 12px 36px rgba(0,0,0,.4);
  }
  .cal-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}
  .cal-seta{
    font-size:1.3rem;line-height:1;
    background:var(--fumaca);color:var(--amarelo);
    border:1px solid rgba(247,179,43,.35);border-radius:10px;
    width:42px;height:38px;cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .cal-seta:hover{background:rgba(247,179,43,.15);transform:translateY(-1px)}
  .cal-titulo{
    font-family:'Alfa Slab One',serif;font-size:1.3rem;
    color:var(--branco);text-align:center;flex:1;
  }
  .cal-titulo small{
    display:block;
    font-family:'Barlow Condensed',sans-serif;
    font-size:.75rem;font-weight:600;
    letter-spacing:2.5px;text-transform:uppercase;
    color:var(--laranja);
  }
  .cal-btn-hoje{
    font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.85rem;
    text-transform:uppercase;letter-spacing:1.5px;
    background:transparent;color:var(--cinza);
    border:1px solid rgba(184,172,156,.35);border-radius:100px;
    padding:8px 14px;cursor:pointer;
  }
  .cal-btn-hoje:hover{color:var(--amarelo);border-color:var(--amarelo)}
  .cal-grade{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
  .cal-sem{
    font-family:'Barlow Condensed',sans-serif;font-weight:600;
    font-size:.78rem;text-transform:uppercase;letter-spacing:1.5px;
    color:var(--laranja);text-align:center;padding:4px 0 6px;
  }
  .cal-dia{
    background:rgba(255,248,238,.03);
    border:1px solid rgba(255,248,238,.07);
    border-radius:10px;
    min-height:66px;padding:7px 8px;
    color:var(--cinza);font-size:.92rem;font-weight:600;
    transition:transform .12s, background .15s, border-color .15s;
  }
  .cal-dia.fds{background:rgba(247,179,43,.055)}
  .cal-dia.vazio{background:transparent;border-color:transparent}
  .cal-dia.hoje{border-color:var(--amarelo);box-shadow:inset 0 0 0 1px var(--amarelo)}
  .cal-dia.tem{cursor:pointer;color:var(--branco);border-color:rgba(247,179,43,.45)}
  .cal-dia.tem:hover{transform:translateY(-2px);background:rgba(247,179,43,.1)}
  .cal-dia.sel{
    background:rgba(247,179,43,.16);border-color:var(--amarelo);
    box-shadow:0 0 0 1px var(--amarelo), 0 6px 18px rgba(232,100,27,.28);
  }
  .cal-qtd{
    display:block;width:fit-content;margin-top:6px;
    background:linear-gradient(180deg,var(--amarelo),var(--laranja));
    color:var(--preto);border-radius:100px;
    font-size:.72rem;font-weight:700;padding:1px 8px;
    box-shadow:0 2px 8px rgba(232,100,27,.35);
  }
  .cal-qtd.ok{
    background:linear-gradient(180deg,#63C987,var(--verde));
    box-shadow:0 2px 8px rgba(76,175,110,.3);
  }
  .cal-legenda{
    display:flex;gap:16px;flex-wrap:wrap;
    margin-top:16px;color:var(--cinza);font-size:.82rem;
  }
  .cal-legenda span{display:flex;align-items:center;gap:6px}
  .cal-bola{display:inline-block;width:12px;height:12px;border-radius:100px}
  .cal-bola.amarela{background:linear-gradient(180deg,var(--amarelo),var(--laranja))}
  .cal-bola.verde{background:linear-gradient(180deg,#63C987,var(--verde))}
  .cal-bola.borda{background:transparent;border:2px solid var(--amarelo)}
  .resumo-areas{
    display:flex;flex-wrap:wrap;gap:10px;
    margin:0 0 16px;
  }
  .ra-total{
    background:linear-gradient(180deg,var(--amarelo),var(--laranja));
    color:var(--preto);font-weight:700;
    border-radius:100px;padding:6px 16px;font-size:.9rem;
    box-shadow:0 3px 10px rgba(232,100,27,.3);
  }
  .ra-item{
    background:var(--carvao);
    border:1px solid rgba(247,179,43,.35);
    color:var(--branco);
    border-radius:100px;padding:6px 14px;font-size:.9rem;
  }
  .ra-item strong{color:var(--amarelo)}
  .area-info{color:var(--amarelo);font-weight:600}
  .cal-dia-titulo{
    font-family:'Alfa Slab One',serif;font-weight:400;
    font-size:1.05rem;margin:22px 0 12px;
  }
  @media (max-width:600px){
    .cal-grade{gap:4px}
    .cal-dia{min-height:50px;padding:4px 5px;font-size:.8rem;border-radius:8px}
    .cal-qtd{font-size:.66rem;padding:0 6px;margin-top:4px}
    .cal-titulo{font-size:1.05rem}
    .cal-btn-hoje{padding:7px 10px;font-size:.78rem}
  }
  @media (prefers-reduced-motion: reduce){
    .cal-dia,.cal-seta{transition:none}
  }

  .linha-cliente{cursor:pointer}
  .linha-cliente:hover td{background:rgba(247,179,43,.07)}
  .nome-link{color:var(--amarelo);font-weight:600;text-decoration:underline;text-underline-offset:3px}

  /* ---------- DASHBOARD ---------- */
  .dash-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
    margin-bottom:8px;
  }
  @media (max-width:720px){.dash-grid{grid-template-columns:repeat(2,1fr)}}
  .dash-card{
    background:linear-gradient(180deg,var(--carvao),#15100C);
    border:1px solid rgba(247,179,43,.22);
    border-radius:14px;
    padding:20px 16px;
    text-align:center;
    display:flex;flex-direction:column;gap:2px;
  }
  .dash-card.atencao{border-color:var(--amarelo);box-shadow:0 0 0 1px var(--amarelo), 0 8px 24px rgba(232,100,27,.2)}
  .dc-num{
    font-family:'Alfa Slab One',serif;font-size:2.2rem;line-height:1.1;
    background:linear-gradient(180deg,var(--amarelo),var(--laranja));
    -webkit-background-clip:text;background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .dc-rot{
    font-family:'Barlow Condensed',sans-serif;font-weight:600;
    font-size:.85rem;letter-spacing:2px;text-transform:uppercase;
    color:var(--branco);
  }
  .dc-sub{font-size:.78rem;color:var(--cinza)}
  .dash-sec{
    font-family:'Alfa Slab One',serif;font-weight:400;
    font-size:1.02rem;margin:22px 0 12px;
  }
  .dash-graf-card{
    background:linear-gradient(180deg,var(--carvao),#15100C);
    border:1px solid rgba(247,179,43,.22);
    border-radius:14px;
    padding:18px 16px 12px;
  }
  .dash-graf{display:flex;gap:8px;align-items:stretch;height:150px}
  .dg-col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:5px}
  .dg-num{font-size:.85rem;font-weight:700;color:var(--amarelo);min-height:1.1em}
  .dg-bar{
    width:100%;max-width:46px;
    background:linear-gradient(180deg,var(--amarelo),var(--laranja));
    border-radius:6px 6px 0 0;
    box-shadow:0 4px 12px rgba(232,100,27,.25);
  }
  .dg-bar.zero{background:rgba(255,248,238,.08);box-shadow:none}
  .dg-lab{
    font-family:'Barlow Condensed',sans-serif;font-weight:600;
    font-size:.72rem;letter-spacing:1px;text-transform:uppercase;
    color:var(--cinza);text-align:center;line-height:1.25;
  }
  .criada{font-size:.8rem;color:var(--cinza);margin-top:5px;opacity:.85}

  /* ---------- DASHBOARD CLICÁVEL ---------- */
  .dash-card.clicavel{cursor:pointer;transition:transform .15s, box-shadow .2s, border-color .15s}
  .dash-card.clicavel:hover{
    transform:translateY(-4px);
    border-color:var(--amarelo);
    box-shadow:0 12px 28px rgba(232,100,27,.22);
  }
  .dg-col.clicavel{cursor:pointer}
  .dg-col.clicavel:hover .dg-bar{filter:brightness(1.3)}
  .dg-col.clicavel:hover .dg-lab{color:var(--amarelo)}
  .ra-item.clicavel{cursor:pointer;transition:border-color .15s, background .15s}
  .ra-item.clicavel:hover{border-color:var(--amarelo);background:rgba(247,179,43,.12)}
  .dash-dica{margin-top:16px;color:var(--cinza);font-size:.82rem;opacity:.8}
  .nome-cliente[data-tel]{cursor:pointer;width:fit-content}
  .nome-cliente[data-tel]:hover{color:var(--amarelo);text-decoration:underline;text-underline-offset:3px}
  @media (prefers-reduced-motion: reduce){.dash-card.clicavel{transition:none}}

  /* ---------- AVISO DE NOVA RESERVA ---------- */
  #toast-nova{
    position:fixed;top:18px;right:18px;z-index:200;
    display:none;
    background:linear-gradient(180deg,var(--carvao),#15100C);
    border:1px solid var(--amarelo);
    border-radius:12px;
    padding:16px 20px;
    max-width:320px;
    box-shadow:0 14px 40px rgba(0,0,0,.55), 0 0 0 1px rgba(247,179,43,.25);
    cursor:pointer;
    animation:toastEntra .35s ease-out both;
  }
  @keyframes toastEntra{
    from{opacity:0;transform:translateY(-14px)}
    to{opacity:1;transform:none}
  }
  #toast-nova .t-titulo{
    font-family:'Barlow Condensed',sans-serif;font-weight:600;
    font-size:.85rem;letter-spacing:2px;text-transform:uppercase;
    color:var(--amarelo);margin-bottom:4px;
  }
  #toast-nova .t-corpo{font-size:.95rem;color:var(--branco)}
  @media (prefers-reduced-motion: reduce){#toast-nova{animation:none}}

  #vazio{
    display:none;text-align:center;color:var(--cinza);
    padding:50px 20px;
  }
  #carregando{text-align:center;color:var(--cinza);padding:40px}
  @media (max-width:600px){
    .cartao{flex-direction:column;align-items:flex-start}
    .acoes{width:100%;flex-wrap:wrap}
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <div class="marca-wrap"><img src="logo.png" alt="" class="logo-nav"><div class="marca">BOI NA <span>BRASA</span><small>Painel de reservas</small></div></div>
    <button id="btn-sair">Sair</button>
  </div>
</header>

<!-- ===== TELA DE LOGIN ===== -->
<section id="tela-login">
  <div class="container">
    <div class="card-login">
      <img src="logo.png" alt="Boi na Brasa" class="logo-login">
      <h1>&Aacute;rea da equipe &#x1F510;</h1>
      <p>Entre com seu e-mail e senha cadastrados no Supabase.</p>
      <form id="form-login">
        <label for="email">E-mail</label>
        <input type="email" id="email" required autocomplete="username">
        <label for="senha">Senha</label>
        <input type="password" id="senha" required autocomplete="current-password">
        <button type="submit" class="btn" id="btn-login">Entrar</button>
        <div class="erro-login" id="erro-login"></div>
      </form>
    </div>
  </div>
</section>

<!-- ===== PAINEL ===== -->
<section id="tela-painel">
  <div class="container">
    <div class="filtros">
      <button class="filtro ativo" data-filtro="hoje">Hoje</button>
      <button class="filtro" data-filtro="pendente">Pendentes</button>
      <button class="filtro" data-filtro="confirmada">Confirmadas</button>
      <button class="filtro" data-filtro="todas">Todas</button>
      <button class="filtro" data-filtro="calendario">&#x1F4C5; Calend&aacute;rio</button>
      <button class="filtro" data-filtro="dashboard">&#x1F4CA; Dashboard</button>
      <button class="filtro" data-filtro="clientes">Clientes</button>
    </div>
    <div id="contador"></div>
    <div id="carregando">Carregando reservas...</div>
    <div id="lista"></div>
    <div id="vazio">Nenhuma reserva por aqui ainda. &#x1F37D;&#xFE0F;</div>
  </div>
</section>

<script>
  // ===== CONFIGURAÇÃO =====
  const SUPABASE_URL = "https://hysnhjzngbrrjrqczmxi.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh5c25oanpuZ2JycmpycWN6bXhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NTc2MTksImV4cCI6MjA5OTEzMzYxOX0.vBDuJmogatj2HyetGhSmu3z1q5S7S_OPCDNF49vZAQo";

  // Emojis escritos em código unicode para nunca corromperem
  const E_FOGO = "\uD83D\uDD25";      // fogo
  const E_CHECK = "\u2705";           // confirmado
  const E_DATA = "\uD83D\uDCC5";      // calendário
  const E_HORA = "\uD83D\uDD57";      // relógio
  const E_PESSOAS = "\uD83D\uDC65";   // pessoas
  const E_CARNE = "\uD83C\uDF56";     // carne
  const E_ESTRELA = "\u2B50";         // estrela

  let tokenAcesso = null;
  let filtroAtual = "hoje";
  let reservas = [];

  const telaLogin = document.getElementById("tela-login");
  const telaPainel = document.getElementById("tela-painel");
  const btnSair = document.getElementById("btn-sair");
  const lista = document.getElementById("lista");
  const vazio = document.getElementById("vazio");
  const carregando = document.getElementById("carregando");
  const contador = document.getElementById("contador");

  // ===== SESSÃO SALVA (login vale por 1 hora) =====
  const SESSAO_DURACAO_MS = 60 * 60 * 1000; // 1 hora

  function salvarSessao(token) {
    try {
      localStorage.setItem("bnb_token", token);
      localStorage.setItem("bnb_expira", String(Date.now() + SESSAO_DURACAO_MS));
    } catch (e) {}
  }
  function limparSessao() {
    try {
      localStorage.removeItem("bnb_token");
      localStorage.removeItem("bnb_expira");
    } catch (e) {}
  }
  function sessaoSalva() {
    try {
      const t = localStorage.getItem("bnb_token");
      const exp = parseInt(localStorage.getItem("bnb_expira") || "0", 10);
      if (t && Date.now() < exp) return t;
    } catch (e) {}
    return null;
  }
  function entrarNoPainel() {
    telaLogin.style.display = "none";
    telaPainel.style.display = "block";
    btnSair.style.display = "inline-block";
    if ("Notification" in window && Notification.permission === "default") {
      Notification.requestPermission();
    }
    carregarReservas();
  }
  function voltarAoLogin() {
    limparSessao();
    tokenAcesso = null;
    telaPainel.style.display = "none";
    btnSair.style.display = "none";
    telaLogin.style.display = "block";
  }

  // ===== LOGIN =====
  document.getElementById("form-login").addEventListener("submit", async function (e) {
    e.preventDefault();
    const btn = document.getElementById("btn-login");
    const erro = document.getElementById("erro-login");
    erro.style.display = "none";
    btn.disabled = true;
    btn.textContent = "Entrando...";

    try {
      const resp = await fetch(SUPABASE_URL + "/auth/v1/token?grant_type=password", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY
        },
        body: JSON.stringify({
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("senha").value
        })
      });
      const dados = await resp.json();
      if (!resp.ok || !dados.access_token) {
        throw new Error(dados.error_description || "Login inválido");
      }
      tokenAcesso = dados.access_token;
      salvarSessao(tokenAcesso);
      entrarNoPainel();
    } catch (err) {
      erro.textContent = "E-mail ou senha incorretos. Tente de novo.";
      erro.style.display = "block";
    } finally {
      btn.disabled = false;
      btn.textContent = "Entrar";
    }
  });

  // ===== SAIR =====
  btnSair.addEventListener("click", function () {
    voltarAoLogin();
    document.getElementById("senha").value = "";
  });

  // Se já logou há menos de 1 hora, entra direto sem pedir senha
  const tokenGuardado = sessaoSalva();
  if (tokenGuardado) {
    tokenAcesso = tokenGuardado;
    entrarNoPainel();
  }

  // ===== CARREGAR RESERVAS =====
  async function carregarReservas() {
    carregando.style.display = "block";
    lista.innerHTML = "";
    vazio.style.display = "none";
    try {
      const resp = await fetch(
        SUPABASE_URL + "/rest/v1/reservas?select=*&order=data_reserva.asc,horario.asc",
        {
          headers: {
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": "Bearer " + tokenAcesso
          }
        }
      );
      if (resp.status === 401) { voltarAoLogin(); return; }
      if (!resp.ok) throw new Error("Erro " + resp.status);
      reservas = await resp.json();
      idsConhecidos = new Set(reservas.map(function (r) { return r.id; }));
      desenharLista();
    } catch (err) {
      lista.innerHTML = "<p style='color:#FF8A5C'>Erro ao carregar reservas. Atualize a página e faça login de novo.</p>";
    } finally {
      carregando.style.display = "none";
    }
  }

  // ===== FILTROS =====
  document.querySelectorAll(".filtro").forEach(function (b) {
    b.addEventListener("click", function () {
      document.querySelectorAll(".filtro").forEach(function (x) { x.classList.remove("ativo"); });
      b.classList.add("ativo");
      filtroAtual = b.dataset.filtro;
      dashDetalhe = null;
      desenharLista();
    });
  });

  function dataHojeISO() {
    const h = new Date();
    h.setMinutes(h.getMinutes() - h.getTimezoneOffset());
    return h.toISOString().split("T")[0];
  }

  function formatarData(iso) {
    const partes = iso.split("-");
    return partes[2] + "/" + partes[1] + "/" + partes[0];
  }

  function formatarCriada(ts) {
    let t = String(ts).replace(" ", "T");
    if (/[+-]\d\d$/.test(t)) t += ":00";
    const d = new Date(t);
    if (isNaN(d)) return "";
    return d.toLocaleDateString("pt-BR") + " \u00E0s " + d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
  }

  function telDe(r) {
    return (r.telefone || "").replace(/\D/g, "");
  }

  // Quantas reservas esse telefone já fez (histórico do cliente)
  function historicoCliente(tel) {
    return reservas.filter(function (x) { return telDe(x) === tel; }).length;
  }

  // Monta o link do WhatsApp do jeito certo para cada aparelho:
  // - celular: wa.me (abre o app do celular, emojis funcionam)
  // - computador: WhatsApp Web (o app de computador tem um bug que quebra emojis)
  function linkZap(telLimpo, mensagem) {
    const ehCelular = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (ehCelular) {
      return "https://wa.me/55" + telLimpo + "?text=" + encodeURIComponent(mensagem);
    }
    return "https://web.whatsapp.com/send?phone=55" + telLimpo + "&text=" + encodeURIComponent(mensagem);
  }

  // ===== LINK DE CONFIRMAÇÃO NO WHATSAPP =====
  function linkConfirmacao(r) {
    const telLimpo = telDe(r);
    const hor = r.horario.slice(0, 5);
    let mensagem =
      "Olá, " + r.nome.split(" ")[0] + "! Aqui é da Churrascaria Boi na Brasa " + E_FOGO + "\n\n" +
      "Sua reserva está CONFIRMADA " + E_CHECK + "\n\n" +
      E_DATA + " Data: " + formatarData(r.data_reserva) + "\n" +
      E_HORA + " Horário: " + hor + "\n" +
      E_PESSOAS + " Pessoas: " + r.num_pessoas;

    // Reservas entre 20h e 21h30: aviso de tolerância de 30 minutos
    if (hor >= "20:00" && hor <= "21:30") {
      mensagem += "\n\n\u23F0 Importante: seguramos sua mesa por até 30 minutos após o horário marcado. Passado esse prazo, a reserva poderá ser liberada para outros clientes.";
    }

    mensagem +=
      "\n\nTe esperamos! " + E_CARNE + "\n" +
      "Av. Senador Paulo Pessoa Guerra, 112 \u2013 Surubim/PE";
    return linkZap(telLimpo, mensagem);
  }

  // ===== DESENHAR (decide qual visão mostrar) =====
  function desenharLista() {
    if (filtroAtual === "dashboard") { desenharDashboard(); return; }
    if (filtroAtual === "clientes") { desenharClientes(); return; }
    if (filtroAtual === "calendario") { desenharCalendario(); return; }

    const hoje = dataHojeISO();
    let filtradas = reservas;
    if (filtroAtual === "hoje") {
      filtradas = reservas.filter(function (r) { return r.data_reserva === hoje && r.status !== "cancelada"; });
    } else if (filtroAtual === "pendente" || filtroAtual === "confirmada") {
      filtradas = reservas.filter(function (r) { return r.status === filtroAtual; });
    }

    contador.textContent = filtradas.length + (filtradas.length === 1 ? " reserva" : " reservas");
    lista.innerHTML = "";
    vazio.style.display = filtradas.length === 0 ? "block" : "none";

    filtradas.forEach(function (r) {
      lista.appendChild(montarCartao(r));
    });
    ligarBotoes();
  }

  // ===== MONTA UM CARTÃO DE RESERVA =====
  function montarCartao(r) {
      const div = document.createElement("div");
      div.className = "cartao " + r.status;

      const telLimpo = telDe(r);
      const vezes = historicoCliente(telLimpo);
      const linkWhats = linkZap(telLimpo,
        "Olá, " + r.nome.split(" ")[0] + "! Aqui é da Churrascaria Boi na Brasa " + E_FOGO + " Sobre sua reserva de " +
        formatarData(r.data_reserva) + " às " + r.horario.slice(0,5) + " para " + r.num_pessoas + " pessoa(s):"
      );

      let botoes = "";
      if (r.status === "pendente") {
        botoes = '<button class="b-confirmar" data-id="' + r.id + '" data-acao="confirmada">\u2713 Confirmar</button>' +
                 '<button class="b-cancelar" data-id="' + r.id + '" data-acao="cancelada">\u2715 Cancelar</button>';
      } else if (r.status === "confirmada") {
        botoes = '<button class="b-cancelar" data-id="' + r.id + '" data-acao="cancelada">\u2715 Cancelar</button>';
      } else {
        botoes = '<button class="b-confirmar" data-id="' + r.id + '" data-acao="pendente">\u21A9 Reativar</button>';
      }

      div.innerHTML =
        '<div class="info-reserva">' +
          '<span class="badge ' + r.status + '">' + r.status + '</span>' +
          '<div class="nome-cliente" data-tel="' + telLimpo + '" title="Ver hist\u00F3rico do cliente">' + escapar(r.nome) + '</div>' +
          '<div class="detalhes"><strong>' + formatarData(r.data_reserva) + '</strong> às <strong>' + r.horario.slice(0,5) + '</strong> · ' + r.num_pessoas + ' pessoa(s) · ' + escapar(r.telefone) + (r.area ? ' · <span class="area-info">' + escapar(r.area) + '</span>' : '') + '</div>' +
          (r.observacoes ? '<div class="obs">\u201C' + escapar(r.observacoes) + '\u201D</div>' : '') +
          (vezes > 1 ? '<div class="fiel">' + E_ESTRELA + ' Cliente com ' + vezes + ' reservas conosco</div>' : '') +
          (r.criada_em ? '<div class="criada">Reserva feita em ' + formatarCriada(r.criada_em) + '</div>' : '') +
        '</div>' +
        '<div class="acoes">' +
          '<a class="b-whats" href="' + linkWhats + '" target="_blank" rel="noopener">WhatsApp</a>' +
          botoes +
        '</div>';

      return div;
  }

  // ===== LIGA OS BOTÕES DOS CARTÕES =====
  function ligarBotoes() {
    lista.querySelectorAll("button[data-acao]").forEach(function (b) {
      b.addEventListener("click", function () {
        // Abre a janela AGORA (durante o clique) para o navegador não bloquear o pop-up.
        // O endereço do WhatsApp só é colocado nela depois que o banco confirmar.
        let janelaWhats = null;
        if (b.dataset.acao === "confirmada") {
          janelaWhats = window.open("about:blank", "_blank");
        }
        mudarStatus(b.dataset.id, b.dataset.acao, b, janelaWhats);
      });
    });

    // clique no nome do cliente abre o histórico dele
    lista.querySelectorAll(".nome-cliente[data-tel]").forEach(function (n) {
      n.addEventListener("click", function () {
        irParaFiltro("clientes");
        desenharHistorico(n.dataset.tel);
      });
    });
  }

  // ===== CALENDÁRIO =====
  let mesCal = null;        // "YYYY-MM" do mês exibido
  let diaEscolhido = null;  // "YYYY-MM-DD" selecionado

  function desenharCalendario() {
    if (!mesCal) mesCal = dataHojeISO().slice(0, 7);
    const ano = Number(mesCal.slice(0, 4));
    const mes = Number(mesCal.slice(5, 7));
    const diasNoMes = new Date(ano, mes, 0).getDate();
    const primeiroDiaSemana = new Date(ano, mes - 1, 1).getDay();
    const hoje = dataHojeISO();

    // conta reservas (não canceladas) por dia do mês exibido
    const porDia = {};
    let totalMes = 0;
    reservas.forEach(function (r) {
      if (r.status === "cancelada") return;
      if (r.data_reserva.slice(0, 7) !== mesCal) return;
      const d = Number(r.data_reserva.slice(8, 10));
      if (!porDia[d]) porDia[d] = { total: 0, pendentes: 0 };
      porDia[d].total++;
      if (r.status === "pendente") porDia[d].pendentes++;
      totalMes++;
    });

    const nomesMes = ["Janeiro","Fevereiro","Mar\u00E7o","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    contador.textContent = totalMes + (totalMes === 1 ? " reserva em " : " reservas em ") + nomesMes[mes - 1] + " de " + ano;
    vazio.style.display = "none";

    let html =
      '<div class="cal-card">' +
      '<div class="cal-nav">' +
        '<button class="cal-seta" id="cal-ant" aria-label="M\u00EAs anterior">\u2039</button>' +
        '<div class="cal-titulo"><small>Calend\u00E1rio de reservas</small>' + nomesMes[mes - 1] + ' ' + ano + '</div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<button class="cal-btn-hoje" id="cal-hoje">Hoje</button>' +
          '<button class="cal-seta" id="cal-prox" aria-label="Pr\u00F3ximo m\u00EAs">\u203A</button>' +
        '</div>' +
      '</div>' +
      '<div class="cal-grade">';

    ["Dom","Seg","Ter","Qua","Qui","Sex","S\u00E1b"].forEach(function (n) {
      html += '<div class="cal-sem">' + n + '</div>';
    });
    for (let v = 0; v < primeiroDiaSemana; v++) {
      html += '<div class="cal-dia vazio"></div>';
    }
    for (let d = 1; d <= diasNoMes; d++) {
      const iso = mesCal + "-" + String(d).padStart(2, "0");
      const diaSemana = (primeiroDiaSemana + d - 1) % 7;
      let classes = "cal-dia";
      if (diaSemana === 0 || diaSemana === 5 || diaSemana === 6) classes += " fds";
      if (iso === hoje) classes += " hoje";
      if (porDia[d]) classes += " tem";
      if (iso === diaEscolhido) classes += " sel";
      html += '<div class="' + classes + '" data-data="' + iso + '">' + d +
        (porDia[d] ? '<span class="cal-qtd' + (porDia[d].pendentes > 0 ? '' : ' ok') + '">' + porDia[d].total + '</span>' : '') +
      '</div>';
    }
    html += '</div>' +
      '<div class="cal-legenda">' +
        '<span><i class="cal-bola amarela"></i> tem pendentes</span>' +
        '<span><i class="cal-bola verde"></i> todas confirmadas</span>' +
        '<span><i class="cal-bola borda"></i> hoje</span>' +
      '</div>' +
      '</div>';

    let doDia = [];
    if (diaEscolhido && diaEscolhido.slice(0, 7) === mesCal) {
      doDia = reservas.filter(function (r) {
        return r.data_reserva === diaEscolhido && r.status !== "cancelada";
      });

      // resumo por área do dia
      const porArea = {};
      doDia.forEach(function (r) {
        const a = r.area || "Sem área definida";
        porArea[a] = (porArea[a] || 0) + 1;
      });

      html += '<div class="cal-dia-titulo">Reservas de ' + formatarData(diaEscolhido) + '</div>';
      html += '<div class="resumo-areas">' +
        '<span class="ra-total">' + doDia.length + (doDia.length === 1 ? ' reserva' : ' reservas') + ' no total</span>';
      Object.keys(porArea).sort(function (a, b) { return porArea[b] - porArea[a]; }).forEach(function (a) {
        html += '<span class="ra-item">' + escapar(a) + ': <strong>' + porArea[a] + '</strong></span>';
      });
      html += '</div>';
    }

    lista.innerHTML = html;

    // cartões das reservas do dia selecionado
    if (doDia.length > 0) {
      doDia.forEach(function (r) { lista.appendChild(montarCartao(r)); });
      ligarBotoes();
    }

    // navegação entre meses
    document.getElementById("cal-ant").addEventListener("click", function () { mudarMes(-1); });
    document.getElementById("cal-prox").addEventListener("click", function () { mudarMes(1); });
    document.getElementById("cal-hoje").addEventListener("click", function () {
      mesCal = dataHojeISO().slice(0, 7);
      diaEscolhido = null;
      desenharCalendario();
    });

    // clique nos dias com reserva
    lista.querySelectorAll(".cal-dia.tem").forEach(function (c) {
      c.addEventListener("click", function () {
        diaEscolhido = (diaEscolhido === c.dataset.data) ? null : c.dataset.data;
        desenharCalendario();
      });
    });
  }

  function mudarMes(delta) {
    const ano = Number(mesCal.slice(0, 4));
    const mes = Number(mesCal.slice(5, 7));
    const d = new Date(ano, mes - 1 + delta, 1);
    mesCal = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0");
    diaEscolhido = null;
    desenharCalendario();
  }

  // ===== DASHBOARD =====
  function isoDe(d) {
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }

  let dashDetalhe = null;

  function irParaFiltro(f) {
    filtroAtual = f;
    document.querySelectorAll(".filtro").forEach(function (x) {
      x.classList.toggle("ativo", x.dataset.filtro === f);
    });
    desenharLista();
  }

  function irParaCalendarioDia(iso) {
    mesCal = iso.slice(0, 7);
    diaEscolhido = iso;
    irParaFiltro("calendario");
  }

  function desenharDashDetalhe() {
    const itens = dashDetalhe.itens.slice().sort(function (a, b) {
      return (a.data_reserva + a.horario).localeCompare(b.data_reserva + b.horario);
    });
    contador.textContent = itens.length + (itens.length === 1 ? " reserva" : " reservas");
    vazio.style.display = itens.length === 0 ? "block" : "none";

    let html = '<button class="filtro" id="dash-voltar" style="margin-bottom:16px">\u2190 Voltar ao dashboard</button>' +
      '<div class="cal-dia-titulo" style="margin-top:0">' + dashDetalhe.titulo + '</div>';

    if (itens.length > 0) {
      const porArea = {};
      itens.forEach(function (r) {
        const a = r.area || "Sem \u00E1rea definida";
        porArea[a] = (porArea[a] || 0) + 1;
      });
      html += '<div class="resumo-areas">';
      Object.keys(porArea).sort(function (x, y) { return porArea[y] - porArea[x]; }).forEach(function (a) {
        html += '<span class="ra-item">' + escapar(a) + ': <strong>' + porArea[a] + '</strong></span>';
      });
      html += '</div>';
    }

    lista.innerHTML = html;
    itens.forEach(function (r) { lista.appendChild(montarCartao(r)); });
    ligarBotoes();
    document.getElementById("dash-voltar").addEventListener("click", function () {
      dashDetalhe = null;
      desenharDashboard();
    });
  }

  function desenharDashboard() {
    if (dashDetalhe) { desenharDashDetalhe(); return; }

    const hoje = dataHojeISO();
    const ativos = reservas.filter(function (r) { return r.status !== "cancelada"; });

    // semana atual (domingo a sábado)
    const dHoje = new Date(hoje + "T12:00:00");
    const iniSem = new Date(dHoje); iniSem.setDate(dHoje.getDate() - dHoje.getDay());
    const fimSem = new Date(iniSem); fimSem.setDate(iniSem.getDate() + 6);
    const iniISO = isoDe(iniSem), fimISO = isoDe(fimSem);
    const mesAtual = hoje.slice(0, 7);

    const deHoje = ativos.filter(function (r) { return r.data_reserva === hoje; });
    const daSemana = ativos.filter(function (r) { return r.data_reserva >= iniISO && r.data_reserva <= fimISO; });
    const doMes = ativos.filter(function (r) { return r.data_reserva.slice(0, 7) === mesAtual; });
    const pendentes = reservas.filter(function (r) { return r.status === "pendente"; });
    const pessoasHoje = deHoje.reduce(function (t, r) { return t + (r.num_pessoas || 0); }, 0);

    contador.textContent = "Vis\u00E3o geral das reservas";
    vazio.style.display = "none";

    let html = '<div class="dash-grid">' +
      '<div class="dash-card clicavel" id="dash-hoje" title="Ver o dia de hoje no calend\u00E1rio"><span class="dc-num">' + deHoje.length + '</span><span class="dc-rot">Hoje</span><span class="dc-sub">' + pessoasHoje + ' pessoa(s)</span></div>' +
      '<div class="dash-card clicavel" id="dash-semana" title="Ver as reservas da semana"><span class="dc-num">' + daSemana.length + '</span><span class="dc-rot">Esta semana</span><span class="dc-sub">' + formatarData(iniISO).slice(0,5) + ' a ' + formatarData(fimISO).slice(0,5) + '</span></div>' +
      '<div class="dash-card clicavel" id="dash-mes" title="Ver as reservas do m\u00EAs"><span class="dc-num">' + doMes.length + '</span><span class="dc-rot">Este m\u00EAs</span><span class="dc-sub">sem contar canceladas</span></div>' +
      '<div class="dash-card clicavel' + (pendentes.length > 0 ? ' atencao' : '') + '" id="dash-pend" title="Ver as pendentes"><span class="dc-num">' + pendentes.length + '</span><span class="dc-rot">Pendentes</span><span class="dc-sub">' + (pendentes.length > 0 ? 'aguardando voc\u00EA' : 'tudo em dia') + '</span></div>' +
    '</div>';

    // gráfico: próximos 7 dias
    const nomesDia = ["Dom","Seg","Ter","Qua","Qui","Sex","S\u00E1b"];
    let maximo = 1;
    const barras = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(hoje + "T12:00:00"); d.setDate(d.getDate() + i);
      const iso = isoDe(d);
      const q = ativos.filter(function (r) { return r.data_reserva === iso; }).length;
      if (q > maximo) maximo = q;
      barras.push({ iso: iso, rot: i === 0 ? "Hoje" : nomesDia[d.getDay()], dia: String(d.getDate()).padStart(2, "0"), q: q });
    }
    html += '<div class="dash-sec">Pr\u00F3ximos 7 dias</div><div class="dash-graf-card"><div class="dash-graf">';
    barras.forEach(function (b) {
      const alt = Math.round((b.q / maximo) * 100);
      html += '<div class="dg-col' + (b.q > 0 ? ' clicavel' : '') + '" data-data="' + b.iso + '"' + (b.q > 0 ? ' title="Ver o dia no calend\u00E1rio"' : '') + '>' +
        '<span class="dg-num">' + (b.q || "") + '</span>' +
        '<div class="dg-bar' + (b.q === 0 ? ' zero' : '') + '" style="height:' + Math.max(alt, 4) + '%"></div>' +
        '<span class="dg-lab">' + b.rot + '<br>' + b.dia + '</span>' +
      '</div>';
    });
    html += '</div></div>';

    // áreas neste mês
    const porArea = {};
    doMes.forEach(function (r) {
      const a = r.area || "Sem \u00E1rea definida";
      porArea[a] = (porArea[a] || 0) + 1;
    });
    html += '<div class="dash-sec">\u00C1reas neste m\u00EAs</div><div class="resumo-areas">';
    const chavesArea = Object.keys(porArea);
    if (chavesArea.length === 0) {
      html += '<span class="ra-item">Ainda sem reservas no m\u00EAs</span>';
    } else {
      chavesArea.sort(function (a, b) { return porArea[b] - porArea[a]; }).forEach(function (a) {
        html += '<span class="ra-item clicavel" data-area="' + escapar(a) + '" title="Ver as reservas desta \u00E1rea">' + escapar(a) + ': <strong>' + porArea[a] + '</strong></span>';
      });
    }
    html += '</div>';
    html += '<p class="dash-dica">Toque nos cart\u00F5es, nas barras do gr\u00E1fico e nas \u00E1reas para abrir os detalhes. Nos cart\u00F5es de reserva, clique no nome do cliente para ver o hist\u00F3rico.</p>';

    lista.innerHTML = html;

    // cliques do dashboard
    document.getElementById("dash-hoje").addEventListener("click", function () { irParaCalendarioDia(hoje); });
    document.getElementById("dash-pend").addEventListener("click", function () { irParaFiltro("pendente"); });
    document.getElementById("dash-semana").addEventListener("click", function () {
      dashDetalhe = { titulo: "Reservas desta semana \u00B7 " + formatarData(iniISO).slice(0,5) + " a " + formatarData(fimISO).slice(0,5), itens: daSemana };
      desenharDashboard();
    });
    document.getElementById("dash-mes").addEventListener("click", function () {
      dashDetalhe = { titulo: "Reservas deste m\u00EAs", itens: doMes };
      desenharDashboard();
    });
    lista.querySelectorAll(".dg-col.clicavel").forEach(function (c) {
      c.addEventListener("click", function () { irParaCalendarioDia(c.dataset.data); });
    });
    lista.querySelectorAll(".ra-item.clicavel").forEach(function (ch) {
      ch.addEventListener("click", function () {
        const alvo = ch.dataset.area;
        dashDetalhe = {
          titulo: alvo + " \u00B7 neste m\u00EAs",
          itens: doMes.filter(function (r) { return (r.area || "Sem \u00E1rea definida") === alvo; })
        };
        desenharDashboard();
      });
    });
  }

  // ===== CLIENTES (HISTÓRICO) =====
  function desenharClientes() {
    const mapa = {};
    reservas.forEach(function (r) {
      const tel = telDe(r);
      if (!tel) return;
      if (!mapa[tel]) {
        mapa[tel] = { nome: r.nome, telefone: r.telefone, total: 0, confirmadas: 0, ultima: r.data_reserva };
      }
      mapa[tel].total++;
      if (r.status === "confirmada") mapa[tel].confirmadas++;
      if (r.data_reserva > mapa[tel].ultima) mapa[tel].ultima = r.data_reserva;
      mapa[tel].nome = r.nome; // mantém o nome mais recente
    });

    const clientes = Object.keys(mapa).map(function (k) { return mapa[k]; });
    clientes.sort(function (a, b) { return b.total - a.total; });

    contador.textContent = clientes.length + (clientes.length === 1 ? " cliente" : " clientes");
    vazio.style.display = clientes.length === 0 ? "block" : "none";
    if (clientes.length === 0) { lista.innerHTML = ""; return; }

    const medalhas = ["\uD83E\uDD47", "\uD83E\uDD48", "\uD83E\uDD49"];
    let html = '<div class="tabela-wrap"><table class="tabela"><thead><tr>' +
      '<th>#</th><th>Cliente</th><th>Telefone</th><th>Reservas</th><th>Confirmadas</th><th>Última reserva</th>' +
      '</tr></thead><tbody>';
    clientes.forEach(function (c, i) {
      const posicao = i < 3 ? medalhas[i] : (i + 1) + "\u00BA";
      const tel = (c.telefone || "").replace(/\D/g, "");
      html += '<tr class="linha-cliente" data-tel="' + tel + '" title="Clique para ver o histórico">' +
        '<td>' + posicao + '</td>' +
        '<td class="nome-link">' + escapar(c.nome) + '</td>' +
        '<td>' + escapar(c.telefone) + '</td>' +
        '<td>' + c.total + '</td>' +
        '<td>' + c.confirmadas + '</td>' +
        '<td>' + formatarData(c.ultima) + '</td>' +
      '</tr>';
    });
    html += '</tbody></table></div>' +
      '<p style="color:var(--cinza);font-size:.88rem;margin-top:10px">Clique em um cliente para ver o histórico completo de reservas.</p>';
    lista.innerHTML = html;

    lista.querySelectorAll(".linha-cliente").forEach(function (tr) {
      tr.addEventListener("click", function () {
        desenharHistorico(tr.dataset.tel);
      });
    });
  }

  // ===== HISTÓRICO DE UM CLIENTE =====
  function desenharHistorico(tel) {
    const doCliente = reservas.filter(function (r) { return telDe(r) === tel; })
      .slice().sort(function (a, b) {
        return (b.data_reserva + b.horario).localeCompare(a.data_reserva + a.horario);
      });
    if (doCliente.length === 0) { desenharClientes(); return; }

    const nome = doCliente[doCliente.length - 1].nome;
    const confirmadas = doCliente.filter(function (r) { return r.status === "confirmada"; }).length;
    contador.textContent = "Histórico de " + nome + " \u2014 " + doCliente.length +
      (doCliente.length === 1 ? " reserva (" : " reservas (") + confirmadas + " confirmada(s))";
    vazio.style.display = "none";

    let html = '<button class="filtro" id="btn-voltar" style="margin-bottom:16px">\u2190 Voltar para clientes</button>' +
      '<div class="tabela-wrap"><table class="tabela"><thead><tr>' +
      '<th>Data</th><th>Hora</th><th>Pessoas</th><th>Status</th><th>Observações</th>' +
      '</tr></thead><tbody>';
    doCliente.forEach(function (r) {
      html += '<tr>' +
        '<td>' + formatarData(r.data_reserva) + '</td>' +
        '<td>' + r.horario.slice(0, 5) + '</td>' +
        '<td>' + r.num_pessoas + '</td>' +
        '<td><span class="badge ' + r.status + '">' + r.status + '</span></td>' +
        '<td>' + escapar(r.observacoes || "") + '</td>' +
      '</tr>';
    });
    html += '</tbody></table></div>';
    lista.innerHTML = html;
    document.getElementById("btn-voltar").addEventListener("click", desenharClientes);
  }

  function escapar(texto) {
    const d = document.createElement("div");
    d.textContent = texto || "";
    return d.innerHTML;
  }

  // ===== MUDAR STATUS =====
  async function mudarStatus(id, novoStatus, botao, janelaWhats) {
    botao.disabled = true;
    try {
      const resp = await fetch(SUPABASE_URL + "/rest/v1/reservas?id=eq." + id, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": "Bearer " + tokenAcesso,
          "Prefer": "return=minimal"
        },
        body: JSON.stringify({ status: novoStatus })
      });
      if (!resp.ok) throw new Error("Erro " + resp.status);
      const r = reservas.find(function (x) { return x.id === id; });
      if (r) r.status = novoStatus;

      // Confirmou no banco \u2192 manda a janela para o WhatsApp com a mensagem pronta
      if (novoStatus === "confirmada" && r && janelaWhats) {
        janelaWhats.location.href = linkConfirmacao(r);
      } else if (janelaWhats) {
        janelaWhats.close();
      }

      desenharLista();
    } catch (err) {
      if (janelaWhats) janelaWhats.close();
      alert("Não foi possível atualizar. Faça login de novo e tente outra vez.");
      botao.disabled = false;
    }
  }

  // ===== VIGIA DE NOVAS RESERVAS =====
  let idsConhecidos = null;
  let contextoAudio = null;
  const tituloOriginal = document.title;

  setInterval(verificarNovas, 30000); // checa a cada 30 segundos

  async function verificarNovas() {
    if (!tokenAcesso) return;
    try {
      const resp = await fetch(
        SUPABASE_URL + "/rest/v1/reservas?select=*&order=data_reserva.asc,horario.asc",
        { headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": "Bearer " + tokenAcesso } }
      );
      if (resp.status === 401) { voltarAoLogin(); return; }
      if (!resp.ok) return;
      const dados = await resp.json();
      const novas = idsConhecidos
        ? dados.filter(function (r) { return !idsConhecidos.has(r.id); })
        : [];
      reservas = dados;
      idsConhecidos = new Set(dados.map(function (r) { return r.id; }));
      if (novas.length > 0) {
        avisarNovaReserva(novas);
        desenharLista();
      }
    } catch (e) {}
  }

  function avisarNovaReserva(novas) {
    const r = novas[novas.length - 1];
    const corpo = r.nome.split(" ")[0] + " \u2014 " + formatarData(r.data_reserva) + " \u00E0s " + r.horario.slice(0, 5) +
      (r.area ? " \u00B7 " + r.area : "");

    // toast na tela
    let toast = document.getElementById("toast-nova");
    if (!toast) {
      toast = document.createElement("div");
      toast.id = "toast-nova";
      toast.addEventListener("click", function () { toast.style.display = "none"; });
      document.body.appendChild(toast);
    }
    toast.innerHTML = '<div class="t-titulo">\uD83D\uDD14 ' +
      (novas.length === 1 ? "Nova reserva!" : novas.length + " novas reservas!") + '</div>' +
      '<div class="t-corpo">' + escapar(corpo) + '</div>';
    toast.style.display = "block";
    clearTimeout(toast._timer);
    toast._timer = setTimeout(function () { toast.style.display = "none"; }, 10000);

    // som de sino
    tocarSom();

    // título da aba pisca
    document.title = "\uD83D\uDD14 " + (novas.length === 1 ? "Nova reserva!" : novas.length + " novas reservas!");

    // notificação do navegador (funciona até com a aba em segundo plano)
    if ("Notification" in window && Notification.permission === "granted") {
      try {
        new Notification("\uD83D\uDD14 Nova reserva \u2014 Boi na Brasa", { body: corpo, icon: "logo.png" });
      } catch (e) {}
    }
  }

  window.addEventListener("focus", function () { document.title = tituloOriginal; });

  function tocarSom() {
    try {
      if (!contextoAudio) contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
      if (contextoAudio.state === "suspended") contextoAudio.resume();
      const agora = contextoAudio.currentTime;
      [880, 1108.7].forEach(function (freq, i) {
        const osc = contextoAudio.createOscillator();
        const vol = contextoAudio.createGain();
        osc.type = "sine";
        osc.frequency.value = freq;
        vol.gain.setValueAtTime(0.0001, agora + i * 0.18);
        vol.gain.exponentialRampToValueAtTime(0.25, agora + i * 0.18 + 0.02);
        vol.gain.exponentialRampToValueAtTime(0.0001, agora + i * 0.18 + 0.45);
        osc.connect(vol); vol.connect(contextoAudio.destination);
        osc.start(agora + i * 0.18);
        osc.stop(agora + i * 0.18 + 0.5);
      });
    } catch (e) {}
  }
</script>
